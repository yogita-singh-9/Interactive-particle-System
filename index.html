<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hand-Tracking Particle System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 500;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .template-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            font-family: inherit;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .template-btn::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin-right: 12px;
            transition: all 0.25s ease;
        }

        .template-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .template-btn.active {
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.4);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1);
        }

        .template-btn.active::before {
            background: #00f2fe;
            box-shadow: 0 0 8px #00f2fe;
            transform: scale(1.5);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.3s outline;
        }
        
        input[type="color"]:hover::-webkit-color-swatch {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status {
            font-size: 0.85rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ffaa00;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.5);
        }

        .status.active .status-dot {
            background-color: #00ffaa;
            animation: none;
            box-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
        }

        .status.active {
            color: #fff;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #video-element {
            display: none;
        }
        
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #030305;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            transition: opacity 1s ease;
            pointer-events: none;
        }
        
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #00f2fe;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <!-- Three.js and modules -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Tween for smooth transitions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <div>Initializing Tracking Engine...</div>
    </div>

    <video id="video-element" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-container">
        <h1>Particle Engine</h1>
        
        <div class="section">
            <div class="status-box">
                <div class="status" id="tracking-status">
                    <div class="status-dot"></div>
                    <span id="status-text">Loading Models...</span>
                </div>
            </div>
        </div>

        <div class="section">
            <span class="label">Shapes</span>
            <button class="template-btn active" data-template="heart">Heart</button>
            <button class="template-btn" data-template="flower">Flower</button>
            <button class="template-btn" data-template="saturn">Saturn</button>
            <button class="template-btn" data-template="buddha">Buddha Silhouette</button>
            <button class="template-btn" data-template="fireworks">Fireworks</button>
        </div>

        <div class="section" style="margin-top: 5px;">
            <span class="label">Particle Color</span>
            <input type="color" id="particle-color" value="#00f2fe">
        </div>
    </div>

    <script>
        // --- System Configuration & State ---
        const config = {
            particleCount: 8000,
            particleSize: 0.1,
            defaultColor: '#00f2fe',
            currentTemplate: 'heart',
            baseScale: 1.0,
            targetScale: 1.0,
            baseExpansion: 1.0,
            targetExpansion: 1.0,
            handDetected: false,
            tension: 0,
            autoRotateSpeed: 0.5
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.02);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 28;
        camera.position.y = 2;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.autoRotate = true;
        controls.autoRotateSpeed = config.autoRotateSpeed;
        controls.enablePan = false;
        controls.maxDistance = 50;
        controls.minDistance = 5;

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Particle System ---
        let particleSystem;
        let targetPositions = new Float32Array(config.particleCount * 3);
        let currentPositions = new Float32Array(config.particleCount * 3);
        let randomValues = new Float32Array(config.particleCount);
        
        for(let i=0; i<config.particleCount; i++) {
            randomValues[i] = Math.random();
        }
        
        function initParticles() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
            geometry.setAttribute('aRandom', new THREE.BufferAttribute(randomValues, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(config.defaultColor) },
                    uScale: { value: config.baseScale },
                    uExpansion: { value: config.baseExpansion }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform float uScale;
                    uniform float uExpansion;
                    attribute float aRandom;
                    
                    varying float vRandom;
                    
                    void main() {
                        vRandom = aRandom;
                        
                        // Expand outward from center based on uExpansion
                        vec3 pos = position * uExpansion;
                        
                        // Add some floating noise movement based on time and individual randomness
                        float noiseFreq = 2.0;
                        float noiseAmp = 0.4;
                        vec3 noisePos = vec3(pos.x * noiseFreq + uTime, pos.y * noiseFreq + uTime, pos.z * noiseFreq);
                        
                        pos.x += sin(noisePos.y) * noiseAmp * aRandom * uScale;
                        pos.y += cos(noisePos.x) * noiseAmp * aRandom * uScale;
                        pos.z += sin(noisePos.z) * noiseAmp * aRandom * uScale;
                        
                        // Apply general gesture zooming/scaling
                        pos *= uScale;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        
                        // Size attenuation and dynamic sizing
                        float size = 18.0 * uScale * (0.5 + aRandom * 0.5);
                        gl_PointSize = size * (1.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    varying float vRandom;
                    
                    void main() {
                        // Create a soft glowing circle
                        vec2 xy = gl_PointCoord.xy - vec2(0.5);
                        float r = length(xy);
                        if(r > 0.5) discard;
                        
                        // Custom gradient alpha
                        float alpha = smoothstep(0.5, 0.1, r) * (0.4 + vRandom*0.6);
                        
                        // White hot core, colored edge
                        vec3 finalColor = mix(vec3(1.0), uColor, r * 2.0);
                        
                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            
            generateTemplate(config.currentTemplate);
        }

        // --- Shape Math Utilities ---
        function randomPointInSphere(radius) {
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = Math.cbrt(Math.random()) * radius;
            const sinPhi = Math.sin(phi);
            return {
                x: r * sinPhi * Math.cos(theta),
                y: r * sinPhi * Math.sin(theta),
                z: r * Math.cos(phi)
            };
        }

        function generateTemplate(templateName) {
            for (let i = 0; i < config.particleCount; i++) {
                let x = 0, y = 0, z = 0;
                let t = i / config.particleCount; 

                switch(templateName) {
                    case 'heart':
                        {
                            const a = t * Math.PI * 2;
                            const rH = Math.random();
                            x = 16 * Math.pow(Math.sin(a), 3);
                            y = 13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a);
                            
                            // Adding volume
                            const volume = (Math.random() - 0.5) * 4;
                            x += (Math.random()-0.5) * 1.5;
                            y += (Math.random()-0.5) * 1.5;
                            z = volume;
                            
                            x *= 0.6; y *= 0.6; z *= 0.6;
                            y += 2; // Offset center
                        }
                        break;

                    case 'flower':
                        {
                            const phi = t * Math.PI * 137.5; // Golden angle phyllotaxis
                            const rF = Math.sqrt(t) * 14;
                            const zF = Math.sin(rF * 0.5) * 4;
                            
                            x = rF * Math.cos(phi);
                            y = rF * Math.sin(phi);
                            z = zF + (Math.random() - 0.5) * 2;
                            
                            const rot = Math.PI / 2.5;
                            const ty = y * Math.cos(rot) - z * Math.sin(rot);
                            const tz = y * Math.sin(rot) + z * Math.cos(rot);
                            y = ty; z = tz;
                        }
                        break;

                    case 'saturn':
                        if (i < config.particleCount * 0.4) {
                            // Body
                            const p = randomPointInSphere(6);
                            x = p.x; y = p.y; z = p.z;
                        } else {
                            // Rings
                            const angle = Math.random() * Math.PI * 2;
                            // Inner empty space + ring width
                            const rRadius = 8 + (Math.random() * Math.random()) * 8; 
                            x = Math.cos(angle) * rRadius;
                            z = Math.sin(angle) * rRadius;
                            y = (Math.random() - 0.5) * 0.3;
                            
                            // Tilt
                            const tilt = 0.4;
                            const nz = z * Math.cos(tilt) - y * Math.sin(tilt);
                            const ny = z * Math.sin(tilt) + y * Math.cos(tilt);
                            z = nz; y = ny;
                        }
                        break;
                    
                    case 'buddha':
                        {
                            const h = (Math.random() * 24) - 12; // -12 to 12
                            if (h > 7) { 
                                // Head
                                const p = randomPointInSphere(2.8);
                                x = p.x; y = h; z = p.z;
                            } else if (h > -5) { 
                                // Torso
                                const bodyR = 4.5 - ((h - 7) * -0.15); // Tapering
                                const angle = Math.random() * Math.PI * 2;
                                const rRadius = Math.random() * bodyR;
                                x = Math.cos(angle) * rRadius * 1.3;
                                z = Math.sin(angle) * rRadius * 0.8;
                                y = h;
                            } else { 
                                // Base / crossed legs
                                const angle = Math.random() * Math.PI * 2;
                                const rRadius = 5.5 + (-(h + 5)) * 1.8;
                                x = Math.cos(angle) * rRadius;
                                z = Math.sin(angle) * rRadius * 0.7;
                                y = h;
                            }
                            y += 2;
                        }
                        break;

                    case 'fireworks':
                        {
                            // Multiple bursts
                            const numBursts = 5;
                            const burstIndex = Math.floor(Math.random() * numBursts);
                            
                            // Burst centers uniformly distributed in a sphere
                            Math.seedrandom = burstIndex * 100; // Fake seed for cluster centers
                            let cx = Math.sin(burstIndex * 2) * 12;
                            let cy = Math.cos(burstIndex * 3) * 10 + 2;
                            let cz = Math.sin(burstIndex * 5) * 12;
                            
                            if (burstIndex === 0) {
                                cx = cy = cz = 0; // Center big burst
                            }

                            const burstR = burstIndex === 0 ? 12 : 5 + Math.random() * 3;
                            
                            // Generate explosion ray
                            const theta = Math.random() * 2 * Math.PI;
                            const phi = Math.acos((Math.random() * 2) - 1);
                            
                            // Particles heavily weighted towards the shell edge
                            const r = burstR * Math.pow(Math.random(), 0.1); 
                            
                            x = cx + r * Math.sin(phi) * Math.cos(theta);
                            y = cy + r * Math.sin(phi) * Math.sin(theta);
                            z = cz + r * Math.cos(phi);
                        }
                        break;
                }

                targetPositions[i*3] = x;
                targetPositions[i*3+1] = y;
                targetPositions[i*3+2] = z;
            }

            // Animate transition using Tween
            const duration = 1800;
            for (let i = 0; i < config.particleCount; i++) {
                new TWEEN.Tween(currentPositions)
                    .to({
                        [i*3]: targetPositions[i*3],
                        [i*3+1]: targetPositions[i*3+1],
                        [i*3+2]: targetPositions[i*3+2]
                    }, duration + Math.random() * 500) // Staggered finish
                    .easing(TWEEN.Easing.Cubic.InOut)
                    .onUpdate(() => {
                        particleSystem.geometry.attributes.position.needsUpdate = true;
                    })
                    .start();
            }
        }

        initParticles();

        // --- Hand Tracking Logic ---
        const videoElement = document.getElementById('video-element');
        const trackingStatus = document.getElementById('tracking-status');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');

        function calculateTension(landmarks) {
            const wrist = landmarks[0];
            const fingerTips = [4, 8, 12, 16, 20];
            let totalDistance = 0;
            
            fingerTips.forEach(tip => {
                const pt = landmarks[tip];
                const dx = pt.x - wrist.x;
                const dy = pt.y - wrist.y;
                const dz = pt.z - wrist.z;
                totalDistance += Math.sqrt(dx*dx + dy*dy + dz*dz);
            });
            
            return totalDistance / fingerTips.length;
        }

        let isModelLoaded = false;

        function onResults(results) {
            if (!isModelLoaded) {
                isModelLoaded = true;
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 1000);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                config.handDetected = true;
                statusText.innerText = "Hands Detected - Gestures Active";
                trackingStatus.classList.add('active');
                
                // Slow down rotation when interacting
                controls.autoRotateSpeed = config.autoRotateSpeed * 0.2;

                let totalTension = 0;
                for (const landmarks of results.multiHandLandmarks) {
                    totalTension += calculateTension(landmarks);
                }
                const avgTension = totalTension / results.multiHandLandmarks.length;
                
                // Tension heuristic values: 
                // ~0.15 (Closed fist) -> ~0.45 (Open hand spread)
                const normalizedTension = Math.max(0, Math.min(1, (avgTension - 0.2) / 0.25));
                
                // Mappings:
                // Closed hand (tension ~ 0) -> Scale smaller (0.6), Contract particles (0.5)
                // Open hand (tension ~ 1) -> Scale larger (1.5), Expand particles (1.2)
                config.targetScale = 0.6 + (normalizedTension * 0.9);
                config.targetExpansion = 0.5 + (normalizedTension * 0.7);
                
            } else {
                config.handDetected = false;
                statusText.innerText = "Awaiting Hand Detection...";
                trackingStatus.classList.remove('active');
                
                // Return to normal rotation speed
                controls.autoRotateSpeed = config.autoRotateSpeed;
                
                config.targetScale = 1.0;
                config.targetExpansion = 1.0;
            }
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onResults);

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        cameraFeed.start().catch(err => {
            console.error("Camera error:", err);
            statusText.innerText = "Camera access denied.";
            trackingStatus.classList.remove('active');
            loadingOverlay.style.opacity = '0';
        });

        // --- UI Interactions ---
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                generateTemplate(e.target.dataset.template);
            });
        });

        const colorPicker = document.getElementById('particle-color');
        colorPicker.addEventListener('input', (e) => {
            config.defaultColor = e.target.value;
            particleSystem.material.uniforms.uColor.value.set(new THREE.Color(config.defaultColor));
        });

        // --- Render Loop ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();

            // Smoothly interpolate scale and expansion
            config.baseScale += (config.targetScale - config.baseScale) * 0.15;
            config.baseExpansion += (config.targetExpansion - config.baseExpansion) * 0.15;

            if (particleSystem) {
                particleSystem.material.uniforms.uTime.value = clock.getElapsedTime();
                particleSystem.material.uniforms.uScale.value = config.baseScale;
                particleSystem.material.uniforms.uExpansion.value = config.baseExpansion;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
